services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: fotopia_hr
      POSTGRES_USER: fotopia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fotopia -d fotopia_hr"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://fotopia:${POSTGRES_PASSWORD}@db:5432/fotopia_hr
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/documents:/app/documents

volumes:
  postgres_data:
